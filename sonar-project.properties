sonar.projectKey=vscarpenter_gsd-task-manager
sonar.organization=vscarpenter
sonar.projectName=Kanban Task Management

# Source directory
sonar.sources=src

# Exclusions from source analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**,\
  **/__tests__/**,\
  **/__mocks__/**

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  tests/**/*

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage report path (generated by Vitest with --coverage flag)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
